<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插件更新记录</title>
  <style>
    /* 全局样式 */
    body {
      font-family: Arial, sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 0;
    }

    /* 容器样式，用于包裹主要内容 */
   .container {
      max-width: 800px;
      margin: 20px auto;
      background-color: white;
      padding: 30px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    /* 标题样式 */
    h1 {
      text-align: center;
      color: #333;
      margin-top: -10px;
      margin-bottom: 10px; /* 缩短与更新记录的间距 */
      font-size: 28px;
    }

    /* 更新记录条目样式 */
   .update-entry {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }

    /* 更新日期样式 */
   .update-date {
      font-weight: bold;
      color: #666;
      margin-bottom: 8px;
    }

    /* 更新详情样式 */
   .update-details {
      color: #444;
      margin-left: 20px;
      line-height: 1.5;
    }

    /* 列表项样式 */
   .update-details ul li {
      margin-bottom: 6px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>抖音图层</h1>

    <!-- 这里将动态添加更新记录条目 -->
    <div id="updateRecords"></div>

    <script>
      // 模拟的更新记录数据，实际应用中可从数据库或其他数据源获取
      const updateRecordsData = [
        {
          date: '2024-10-25',
          version: '2.0.7+1',
          details: '新增全屏播放\n新增快捷发送消息(类续火花)\n新增长按菜单微透\n新增评论区微透\n新增解析支持选择实况/图片/视屏下载\n新增主页视频/图片批量下载\n新增消息防撤回\n新增仅看一次下载按钮\n新增解除仅看一次限制(会变成自己发的)\n新增隐藏稍后再看\n新增隐藏右侧豆包图标\n新增纯净模式按钮隐藏\n视频右侧新增倍速按钮\n小程序跳广告，此版本起，仅支持越狱使用'
        },
      ];

      // 获取用于添加更新记录条目的 DOM 元素
      const updateRecordsDiv = document.getElementById('updateRecords');

      // 函数：创建并返回一个更新记录条目元素
      function createUpdateEntry(record) {
        const updateEntry = document.createElement('div');
        updateEntry.classList.add('update-entry');

        const updateDate = document.createElement('p');
        updateDate.classList.add('update-date');
        updateDate.textContent = `更新日期：${record.date} - 版本：${record.version}`;

        const updateDetails = document.createElement('p');
        updateDetails.classList.add('update-details');

        // 处理详细内容
        const detailsArray = record.details.split('\n');
        const detailsList = document.createElement('ul');
        detailsArray.forEach(detail => {
          const listItem = document.createElement('li');
          listItem.textContent = detail;
          detailsList.appendChild(listItem);
        });

        updateDetails.appendChild(detailsList);

        updateEntry.appendChild(updateDate);
        updateEntry.appendChild(updateDetails);

        return updateEntry;
      }

      // 遍历更新记录数据并将创建好的更新记录条目添加到页面
      updateRecordsData.forEach((record) => {
        const updateEntry = createUpdateEntry(record);
        updateRecordsDiv.appendChild(updateEntry);
      });
    </script>
  </div>
</body>

</html>
